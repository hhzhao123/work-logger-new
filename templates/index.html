<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作日志记录系统</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>工作日志记录系统</h1>
        
        <div class="section">
            <h2>添加工作记录</h2>
            <form id="logForm">
                <div class="form-group">
                    <label>日期:</label>
                    <input type="date" id="date" required value="">
                </div>
                <div class="form-group">
                    <label>项目:</label>
                    <input type="text" id="project" required placeholder="项目名称">
                </div>
                <div class="form-group">
                    <label>工作内容:</label>
                    <textarea id="content" required placeholder="详细描述工作内容"></textarea>
                </div>
                <div class="form-group">
                    <label>耗时(小时):</label>
                    <input type="number" id="duration" step="0.5" min="0.5" value="1" required>
                </div>
                <button type="submit">添加记录</button>
            </form>
        </div>

        <div class="section">
            <h2>筛选记录</h2>
            <div class="filter-group">
                <label>开始日期:</label>
                <input type="date" id="filterStart">
                <label>结束日期:</label>
                <input type="date" id="filterEnd">
                <button onclick="loadLogs()">查询</button>
                <button onclick="generateReport('week')">生成本周周报</button>
                <button onclick="generateReport('month')">生成本月月报</button>
            </div>
        </div>

        <div class="section">
            <h2>工作记录列表</h2>
            <div id="logsList"></div>
        </div>

        <div class="section" id="reportSection" style="display:none;">
            <h2>报告预览</h2>
            <pre id="reportContent"></pre>
            <button onclick="copyReport()">复制报告</button>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
