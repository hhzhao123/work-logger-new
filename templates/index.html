<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>工作计划助手</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        * { margin:0; padding:0; box-sizing: border-box; font-family: 'Microsoft YaHei', sans-serif; }
        body { background: #f3f4f6; padding: 20px; }
        .wrap { max-width: 1200px; margin:0 auto; }
        .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .box { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 1px 6px rgba(0,0,0,0.1); }
        h2, h3 { margin-bottom: 15px; color: #333; }
        .add-box { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 8px 16px; border: none; border-radius: 4px; background: #2563eb; color: #fff; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        .item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; gap: 8px; }
        .item.done { text-decoration: line-through; color: #999; }
        .del { background: #ef4444; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .report-text { min-height: 260px; padding: 15px; background: #f9fafb; border-radius: 4px; white-space: pre-wrap; font-family: 'Consolas', monospace; line-height: 1.6; }
        .date-select { margin-bottom: 15px; }
        .date-select input { width: 200px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        #countInfo { margin-top: 15px; color: #666; font-size: 14px; }
        .top-right { display: flex; align-items: center; gap: 15px; }
        .top-right span { color: #666; }
        .top-right a { color: #2563eb; text-decoration: none; }
        .top-right a:hover { color: #1d4ed8; }
        .button-group { display: flex; gap: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="top">
        <h2>工作计划助手</h2>
        <div class="top-right">
            <span>欢迎，{{ username }}</span>
            <a href="/logout" style="color: #ef4444;">退出登录</a>
        </div>
    </div>

    <div class="row">
        <!-- 左侧：计划管理 -->
        <div>
            <div class="box">
                <h3>添加工作计划</h3>
                <div class="date-select">
                    <input type="date" id="selDate">
                </div>
                <div class="add-box">
                    <input type="text" id="taskInput" placeholder="输入计划任务..."/>
                    <button onclick="addTask()">添加</button>
                </div>
                <div id="taskList"></div>
                <div id="countInfo"></div>
            </div>
        </div>

        <!-- 右侧：周报月报 -->
        <div>
            <div class="box">
                <h3>自动生成工作报告</h3>
                <div class="button-group">
                    <button onclick="makeWeekReport()">生成周报</button>
                    <button onclick="makeMonthReport()">生成月报</button>
                </div>
                <div class="report-text" id="reportBox">选择上方按钮生成报告</div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const today = new Date();
    const dateStr = today.toISOString().split('T')[0];
    document.getElementById('selDate').value = dateStr;
    currentDateKey = dateStr;
    loadTasks();

    window.addTask = async function() {
        const val = document.getElementById('taskInput').value.trim();
        if (!val) return;
        
        const data = {
            date: currentDateKey,
            content: val
        };
        
        const response = await fetch('/api/tasks', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        
        if (response.ok) {
            document.getElementById('taskInput').value = '';
            loadTasks();
        }
    };

    window.toggleDone = async function(taskId, done) {
        await fetch(`/api/tasks/${taskId}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({done: done})
        });
        loadTasks();
    };

    window.deleteTask = async function(taskId) {
        if (!confirm('确定要删除这条计划吗？')) return;
        
        const response = await fetch(`/api/tasks/${taskId}`, {method: 'DELETE'});
        if (response.ok) {
            loadTasks();
        }
    };

    window.loadTasks = async function() {
        const response = await fetch(`/api/tasks?date=${currentDateKey}`);
        const tasks = await response.json();
        
        const listDiv = document.getElementById('taskList');
        if (tasks.length === 0) {
            listDiv.innerHTML = '<p style="color:#666;">当日暂无计划</p>';
            document.getElementById('countInfo').innerHTML = '';
            return;
        }
        
        const total = tasks.length;
        const done = tasks.filter(t => t.done).length;
        const rate = total ? Math.floor(done / total * 100) : 0;
        
        listDiv.innerHTML = tasks.map(task => `
            <div class="item ${task.done ? 'done' : ''}">
                <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleDone(${task.id}, this.checked)">
                <span style="flex:1;">${task.content}</span>
                <button class="del" onclick="deleteTask(${task.id})">删除</button>
            </div>
        `).join('');
        
        document.getElementById('countInfo').innerHTML = 
            `当日总计：${total} 项   已完成：${done} 项   完成率：${rate}%`;
    };

    window.makeWeekReport = async function() {
        const response = await fetch('/api/report?type=week');
        const data = await response.json();
        document.getElementById('reportBox').innerText = data.report;
        navigator.clipboard.writeText(data.report).then(() => {
            alert('周报已生成并复制到剪贴板！');
        });
    };

    window.makeMonthReport = async function() {
        const response = await fetch('/api/report?type=month');
        const data = await response.json();
        document.getElementById('reportBox').innerText = data.report;
        navigator.clipboard.writeText(data.report).then(() => {
            alert('月报已生成并复制到剪贴板！');
        });
    };

    document.getElementById('selDate').addEventListener('change', function() {
        currentDateKey = this.value;
        loadTasks();
    });
});
</script>
</body>
</html>
