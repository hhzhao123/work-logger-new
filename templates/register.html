<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 工作计划助手</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .auth-container h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 28px;
        }
        .auth-container .form-group {
            margin-bottom: 20px;
        }
        .auth-container label {
            display: block;
            width: 100%;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        .auth-container input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        .auth-container input:focus {
            outline: none;
            border-color: #667eea;
        }
        .auth-container button {
            width: 100%;
            margin-top: 10px;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .auth-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .switch-auth {
            text-align: center;
            margin-top: 25px;
            color: #666;
        }
        .switch-auth a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .switch-auth a:hover {
            text-decoration: underline;
        }
        .error-message {
            color: #ef4444;
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            background: #fef2f2;
            border-radius: 8px;
            display: none;
        }
        .success-message {
            color: #10b981;
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            background: #ecfdf5;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>创建账号</h1>
        <form id="registerForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" required placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" required placeholder="请输入密码">
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" id="confirmPassword" required placeholder="请再次输入密码">
            </div>
            <button type="submit">注册</button>
        </form>
        <div class="error-message" id="errorMsg"></div>
        <div class="success-message" id="successMsg"></div>
        <div class="switch-auth">
            <a href="/login">已有账号？立即登录 ←</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                const errorDiv = document.getElementById('errorMsg');
                errorDiv.textContent = '两次密码不一致';
                errorDiv.style.display = 'block';
                document.getElementById('successMsg').style.display = 'none';
                return;
            }
            
            const data = {
                username: document.getElementById('username').value,
                password: password
            };
            
            const response = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            if (result.success) {
                const successDiv = document.getElementById('successMsg');
                successDiv.textContent = '注册成功！正在跳转...';
                successDiv.style.display = 'block';
                document.getElementById('errorMsg').style.display = 'none';
                setTimeout(() => {
                    window.location.href = '/login';
                }, 1500);
            } else {
                const errorDiv = document.getElementById('errorMsg');
                errorDiv.textContent = result.message;
                errorDiv.style.display = 'block';
                document.getElementById('successMsg').style.display = 'none';
            }
        });
    </script>
</body>
</html>
